<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fruit Match Puzzle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">FRUIT MATCH</p>
      <h1>같은 과일 카드<br />두 장을 추론하세요</h1>
      <p class="description">
        4x4 보드에서 메모리 기반 탐색을 수행하고, 시도 수와 정확도를 보면서 모든 짝을 찾으면 클리어입니다.
      </p>
      <!-- 변경: 고급 개발자 대상에 맞춰 조작법과 관찰 포인트를 노출 -->
      <div class="hero-notes" aria-label="게임 힌트">
        <p><strong>Shortcut</strong> `R`로 리셋, `S`로 셔플</p>
        <p><strong>Focus</strong> 시도 수, 정확도, 경과 시간을 비교해보세요</p>
      </div>
    </section>

    <section class="game-panel">
      <div class="status-card">
        <div>
          <p class="status-label">시도 횟수</p>
          <strong id="move-count">0</strong>
        </div>
        <div>
          <p class="status-label">게임 상태</p>
          <strong id="game-status">플레이 중</strong>
        </div>
      </div>
      <!-- 변경: 고급 개발자용 메타 패널을 추가해 플레이 성능을 관찰 가능하게 구성 -->
      <div class="telemetry-card" aria-label="게임 메타 정보">
        <div>
          <p class="status-label">정확도</p>
          <strong id="accuracy-rate">0%</strong>
        </div>
        <div>
          <p class="status-label">경과 시간</p>
          <strong id="elapsed-time">00:00</strong>
        </div>
        <div>
          <p class="status-label">최고 기록</p>
          <strong id="best-score">-</strong>
        </div>
      </div>

      <div class="board-wrap">
        <div id="board" class="board" aria-label="과일 매칭 퍼즐 보드"></div>
      </div>

      <div class="controls">
        <button id="shuffle-button" type="button">셔플</button>
        <button id="reset-button" type="button" class="secondary">초기화</button>
      </div>

      <p id="message" class="message">
        카드를 눌러 같은 과일의 짝을 찾아보세요.
      </p>
      <!-- 변경: 고급 개발자 대상에 맞춰 현재 게임 시드와 상태 설명을 추가 -->
      <p id="board-seed" class="seed">seed: pending</p>
    </section>
  </main>

  <script src="js/utils.js"></script>
  <script src="js/board.js"></script>
  <script src="js/game.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
